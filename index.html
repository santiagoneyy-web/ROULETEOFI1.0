<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ROULETTE PREDICTOR PRO</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">

    <!-- ═══ TOP BAR ═══ -->
    <header class="top-bar">
        <div class="top-bar-left">
            <span class="app-logo">🎰</span>
            <span class="app-title">ROULETTE PRO</span>
        </div>
        <div class="top-bar-right">
            <select id="table-select" class="compact-select"></select>
            <span class="live-clock" id="live-clock">00:00:00</span>
        </div>
    </header>

    <!-- ═══ AGENT TABS ═══ -->
    <nav class="agent-tab-bar" id="strat-tabs"></nav>

    <!-- ═══ AGENT CARD ═══ -->
    <section class="agent-card" id="agent-card">
        <div class="agent-card-header">
            <span class="agent-icon">🤖</span>
            <span class="agent-card-name" id="active-agent-name">ANDROID N17</span>
            <span class="agent-confidence" id="agent-confidence">0%</span>
        </div>

        <div class="agent-strategy-label" id="agent-strategy">--</div>

        <!-- Wheel dots (visual flair) -->
        <div class="wheel-dots">
            <span class="wd"></span><span class="wd"></span><span class="wd"></span>
        </div>

        <div class="agent-status-row" id="agent-status-row">
            <span class="status-line" id="agent-status">BUSCANDO EN BASE DE DATOS...</span>
        </div>
        <div class="agent-sync-row" id="agent-sync">SINCRONIZANDO BDD...</div>

        <!-- Bottom play info -->
        <div class="play-info-bar" id="play-info-bar">
            <div class="play-chip">
                <span class="pi-label">JUGAR</span>
                <span class="pi-val" id="pi-zone">--</span>
            </div>
            <div class="play-chip">
                <span class="pi-label">CASILLA</span>
                <span class="pi-val" id="pi-casilla">--</span>
            </div>
            <div class="play-chip target-chip">
                <span class="pi-val big-target" id="target-number">--</span>
                <span class="pi-label"><span id="pi-radius">N9</span></span>
            </div>
            <div class="play-chip wl-chip">
                <span class="pi-label">W:<span id="agent-wins">0</span></span>
                <span class="pi-label">L:<span id="agent-losses">0</span></span>
            </div>
        </div>

        <!-- History dots -->
        <div class="result-dots" id="result-dots">
            <span class="rd rd-loss">L</span>
            <span class="rd rd-loss">L</span>
        </div>
    </section>

    <!-- ═══ SUBMIT NUMBER ═══ -->
    <section class="submit-section">
        <input type="number" id="spin-number" min="0" max="36" placeholder="Nº (0-36)" class="spin-input" />
        <button class="spin-btn" onclick="submitNumber()">▶ REGISTRAR</button>
    </section>

    <!-- ═══ TRAVEL DATA ═══ -->
    <section class="travel-section">
        <div class="travel-top-bar">
            <span class="section-title">📊 TRAVEL DATA</span>
            <div class="travel-badges">
                <span class="badge badge-stable" id="travel-pattern">ESTABLE</span>
                <span class="badge badge-zone" id="travel-last-zone">LAST: --</span>
            </div>
        </div>
        <div class="travel-table-wrap">
            <table class="travel-table">
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>DIST</th>
                        <th>DIR</th>
                        <th>PHASE</th>
                    </tr>
                </thead>
                <tbody id="travel-tbody">
                    <tr><td colspan="4" class="muted">Selecciona una mesa...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script src="predictor.js"></script>
<script src="app.js"></script>
</body>
</html>
